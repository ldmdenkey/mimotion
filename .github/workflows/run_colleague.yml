name: 郝健步走

on:
  schedule:
    # 第一次：每天北京时间 15:15 (UTC 07:30) 执行，完美避开你的 15:00
    - cron: '15 7 * * *'
    # 第二次：每天北京时间 21:15 (UTC 13:30) 执行，完美避开你的 21:00
    - cron: '15 13 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 初始化Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 随机延迟运行
        run: |
          delay=$((1 + RANDOM % 900))
          echo "随机延迟 $delay 秒后开始..."
          sleep $delay
          
      - name: 执行同步
        env:
            CONFIG: ${{ secrets.CONFIG_2 }}
            AES_KEY: ${{ secrets.AES_KEY }}
            TZ: Asia/Shanghai
        run: |
          pip3 install requests pytz pycryptodome
          python3 main.py

      - name: 持久化 Token
        run: |
          git config --local user.name github-actions
          git config --local user.email github-actions@users.noreply.github.com
          git add .
          git commit -m "update token" || exit 0
          git pull --rebase origin master
          git push origin master
